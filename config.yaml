pulse:
  polling_interval: 60  # seconds
  connection_timeout: 30
  retry_attempts: 3
  cache_ttl: 300

  # WebSocket and API Settings
  api:
    host: "0.0.0.0"
    port: 8001
    reload: false
    log_level: "info"
    workers: 1

  websocket:
    ping_interval: 10  # seconds
    ping_timeout: 10
    close_timeout: 1
    max_message_size: 1048576  # 1MB
    reconnect:
      enabled: true
      base_delay: 1  # seconds
      max_delay: 30
      jitter: 0.2  # ±20%

  # Message handling
  events:
    callback_timeout: 5.0  # seconds
    buffer_size: 1000  # max events to buffer
    serialize_events: true

  # REST API
  rest_api:
    enabled: true
    rate_limit: 100  # requests per minute
    timeout: 30  # seconds

  thresholds:
    # Optical power thresholds (dBm)
    optical_power:
      warn: -12
      critical: -17

    # Error ratio thresholds
    error_ratio:
      warn: 0.0005
      critical: 0.001

    # Alert management
    alert_cooldown: 300  # seconds (5 minutes) between alerts for same interface

    # Health scoring weights (must sum to 1.0)
    health_weights:
      optical: 0.4      # 40% weight for optical metrics
      errors: 0.3       # 30% weight for error rates
      stability: 0.3    # 30% weight for interface stability

    # Trend analysis sensitivity
    trend_window_size: 5      # Number of samples to analyze
    trend_sensitivity: 10.0   # Percent change to trigger trend alert

  sites: {}

  ui:
    refresh_rate: 2  # seconds
    color_scheme: "dark"  # or "light"
    log_retention: 1000  # lines
